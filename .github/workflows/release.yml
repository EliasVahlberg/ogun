name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: cargo test --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="ogun-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C target/${{ matrix.target }}/release libogun.rlib libogun.d 2>/dev/null || \
          tar czf "$ARCHIVE" -C target/${{ matrix.target }}/release --include='*ogun*' . 2>/dev/null || \
          tar czf "$ARCHIVE" -C target/${{ matrix.target }}/release $(find target/${{ matrix.target }}/release -maxdepth 1 -name '*ogun*' -printf '%f\n')
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "ogun-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $files = Get-ChildItem "target/${{ matrix.target }}/release" -Filter "*ogun*" -File
          Compress-Archive -Path $files.FullName -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ogun-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
